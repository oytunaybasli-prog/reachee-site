<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reachee | İşletmeler ve İçerik Üreticileri İçin İş Birliği Platformu</title>

<style>
:root{
--bg:#050507;
--text:#f8f5ff;
--muted:#aaa7b5;
--purple:#a855f7;
--pink:#f09cf7;
--blue:#4b83ff;
--line:rgba(255,255,255,.11)
}

*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:radial-gradient(circle at 15% 0%,rgba(168,85,247,.22),transparent 32%),
radial-gradient(circle at 90% 18%,rgba(75,131,255,.16),transparent 34%),#050507;
color:var(--text);
}

.wrap{
max-width:1160px;
margin:auto;
padding:28px 22px 80px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:50px;
}

.logo{
width:42px;
height:42px;
border-radius:14px;
display:grid;
place-items:center;
font-weight:900;
background:linear-gradient(135deg,var(--pink),var(--purple),var(--blue));
color:#111;
}

.hero{
display:grid;
grid-template-columns:1.05fr .95fr;
align-items:center;
gap:40px;
}

h1{
font-size:70px;
line-height:0.95;
margin-bottom:20px;
letter-spacing:-2px;
}

.grad{
background:linear-gradient(90deg,var(--pink),var(--purple),var(--blue));
-webkit-background-clip:text;
color:transparent;
}

.lead{
color:#d8d4e7;
font-size:18px;
line-height:1.6;
margin-bottom:25px;
}

.actions{
display:flex;
gap:12px;
margin-bottom:20px;
}

.btn{
padding:14px 22px;
border-radius:999px;
border:none;
cursor:pointer;
font-weight:600;
}

.primary{
background:linear-gradient(90deg,var(--purple),var(--blue));
color:white;
}

.secondary{
background:rgba(255,255,255,.08);
color:white;
border:1px solid var(--line);
}

/* 🔥 YENİ MOCKUP STYLE */
.mockup{
display:flex;
justify-content:center;
}

.mockup img{
width:420px;
max-width:100%;
filter: drop-shadow(0 40px 80px rgba(0,0,0,.8));
}

/* responsive */
@media(max-width:900px){
.hero{
grid-template-columns:1fr;
text-align:center;
}

h1{
font-size:42px;
}

.mockup img{
width:280px;
margin-top:30px;
}
}
</style>
</head>

<body>

<div class="wrap">

<header>
<div style="display:flex;align-items:center;gap:12px;">
<div class="logo">R</div>
<div>
<strong>Reachee</strong><br>
<span style="color:var(--muted);font-size:13px;">
İşletmeler ve içerik üreticileri
</span>
</div>
</div>
</header>

<main class="hero">

<!-- LEFT -->
<section>
<h1>
İşletmeler ile <br>
<span class="grad">doğru içerik üreticilerini</span><br>
buluşturur.
</h1>

<p class="lead">
Reachee, restoran, kafe ve deneyim odaklı işletmelerin influencer iş birliklerini yönetmesini sağlar.
</p>

<div class="actions">
<button class="btn primary">Beta listesine katıl</button>
<button class="btn secondary">Nasıl çalışır?</button>
</div>

</section>

<!-- RIGHT (REAL MOCKUP) -->
<div class="mockup">
<img src="phone.png" alt="Reachee App">
</div>

</main>

</div>

</body>
</html>
